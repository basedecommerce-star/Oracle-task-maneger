name: OutClub Private Secret Probe

on:
  workflow_call:

jobs:
  probe:
    if: github.repository == 'basedecommerce-star/pdd-moldova'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Verify expected deployment secrets exist without exposing them
        shell: bash
        env:
          SSH_KEY: ${{ secrets.PRODUCTION_VPS_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
          VPS_PORT_VALUE: ${{ secrets.VPS_PORT }}
          VPS_USER_VALUE: ${{ secrets.VPS_DEPLOY_USER }}
          VPS_HOST_VALUE: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          [ -n "$SSH_KEY" ]
          [ -n "$KNOWN_HOSTS" ]
          [ -n "$VPS_PORT_VALUE" ]
          [ -n "$VPS_USER_VALUE" ]
          [ -n "$VPS_HOST_VALUE" ]
          echo 'private deployment secret set is available to the reusable workflow'
